<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Alone.Online</title>

<style>
  body {
    background: #000;
    font-family: monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  #menu {
    text-align: center;
  }

  .btn {
    display: block;
    width: 200px;
    padding: 12px;
    margin: 12px auto;
    background: #111;
    color: #fff;
    border: 2px solid #333;
    border-radius: 6px;
    font-size: 1.3em;
    cursor: pointer;
    position: relative;
    transition: 0.2s;
  }

  /* HOVER EFFECT: >>> appears behind the button */
  .btn:hover::before {
    content: ">>>";
    position: absolute;
    left: -60px;
    top: 50%;
    transform: translateY(-50%);
    color: #fff;
    font-weight: bold;
    opacity: 0.9;
  }

  .btn:hover {
    background: #222;
    transform: scale(1.05);
  }
</style>
</head>

<body>

<div id="menu">
  <button class="btn">Play</button>
  <button class="btn">Settings</button>
  <button class="btn">Exit</button>
</div>

</body>
</html>
