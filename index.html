<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Alone.Online</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: monospace;
    }

    #scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* BACKGROUND ROOM */
    #background {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
    }

    /* IVIE STILL VISIBLE */
    #girl {
      position: absolute;
      right: 5%;
      bottom: 5%;
      width: 28%; /* slightly smaller so computer can be bigger */
      z-index: 2;
      opacity: 0.95;
    }

    /* COMPUTER NOW COVERS MOST OF SCREEN */
    #computer {
      position: absolute;
      left: 0%;
      bottom: 10%;
      width: 70%; /* HUGE computer */
      z-index: 3;
      transform: rotate(-4deg);
    }

    /* UI ON COMPUTER SCREEN */
    #screen-ui {
      position: absolute;
      left: 18%;     /* adjusted for bigger computer */
      bottom: 45%;   /* adjusted for bigger computer */
      width: 22%;    /* scaled up to fit screen */
      z-index: 4;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transform: rotate(-4deg);
      text-align: center;
    }

    button {
      background: #111;
      color: #fff;
      border: 1px solid #444;
      padding: 12px 20px;
      cursor: pointer;
      font-size: 1.1rem;
      transition: background 0.2s, transform 0.1s;
    }

    button:hover {
      background: #222;
      transform: scale(1.05);
    }

    /* WARNING */
    #warning {
      color: #ff4444;
      font-size: 0.9rem;
      opacity: 0.8;
      margin-top: 5px;
    }

    /* TITLE */
    #title {
      position: absolute;
      top: 5%;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: 3rem;
      letter-spacing: 2px;
      z-index: 5;
      text-shadow: 0 0 10px #fff;
    }

    /* Subtitle */
    #subtitle {
      position: absolute;
      top: 13%;
      left: 50%;
      transform: translateX(-50%);
      color: #ccc;
      font-size: 1.2rem;
      opacity: 0.7;
      z-index: 5;
    }

  </style>
</head>

<body>

  <div id="scene">

    <img id="background" src="room_bg.png">
    <img id="girl" src="ivie_crying.png">
    <img id="computer" src="computer_left_angle.png">

    <h1 id="title">Alone.Online</h1>
    <p id="subtitle">Can you trust him?</p>

    <div id="screen-ui">
      <button id="playBtn">Play</button>
      <button id="settingsBtn">Settings</button>
      <button id="exitBtn">Exit</button>
      <p id="warning">⚠ Bright colours and flashing lights</p>
    </div>

  </div>

  <script>
    const title = document.getElementById("title");
    setInterval(() => {
      if (Math.random() < 0.03) {
        title.style.opacity = 0.2;
        setTimeout(() => title.style.opacity = 1, 80);
      }
    }, 400);

    const subtitle = document.getElementById("subtitle");
    setInterval(() => {
      if (Math.random() < 0.02) {
        subtitle.style.opacity = 0.2;
        setTimeout(() => subtitle.style.opacity = 0.7, 120);
      }
    }, 500);

    document.getElementById("playBtn").onclick = () => {
      alert("Game starting soon…");
    };

    document.getElementById("settingsBtn").onclick = () => {
      alert("Settings coming soon…");
    };

    document.getElementById("exitBtn").onclick = () => {
      alert("Exit not implemented yet.");
    };
  </script>

</body>
</html>
