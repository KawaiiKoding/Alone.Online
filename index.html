<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Alone.Online</title>

<style>
  body {
    background: #000;
    font-family: monospace;
  }

  #title-screen {
    width: 400px;
    margin: 40px auto;
    text-align: center;
  }

  /* MONITOR */
  #monitor {
    width: 350px;
    height: 260px;
    background: #1a1a1a;
    border-radius: 12px;
    border: 6px solid #0f0f0f;
    box-shadow: inset 0 0 20px #000;
    margin: 0 auto;
    position: relative;
  }

  /* SCREEN — NOW GLOWING WHITE */
  #screen {
    width: 260px;
    height: 180px;
    background: radial-gradient(circle, #ffffff 0%, #e6e6e6 25%, #0d0d0d 100%);
    margin: 30px auto;
    border: 4px solid #000;
    box-shadow:
      inset 0 0 40px #fff,
      inset 0 0 80px #ffffff,
      0 0 20px #fff;
    position: relative;
    padding-top: 10px;
  }

  /* IVIE silhouette */
  #ivie {
    width: 80px;
    height: 120px;
    background: #222;
    border-radius: 40px 40px 0 0;
    margin: 0 auto 10px auto;
    box-shadow: inset 0 0 10px #000;
  }

  /* UI BUTTONS — DIGITAL GLOW */
  .ui-btn {
    display: block;
    width: 140px;
    margin: 6px auto;
    padding: 6px;
    background: rgba(255,255,255,0.15);
    color: #fff;
    border: 2px solid rgba(255,255,255,0.4);
    border-radius: 4px;
    cursor: pointer;
    transition: 0.2s;
    text-shadow: 0 0 6px #fff;
  }

  .ui-btn:hover {
    background: rgba(255,255,255,0.25);
    transform: scale(1.05);
  }

  /* KEYBOARD */
  #keyboard {
    width: 350px;
    height: 60px;
    background: #1a1a1a;
    margin: 20px auto;
    border-radius: 8px;
    box-shadow: inset 0 0 10px #000;
  }

  /* MOUSE */
  #mouse {
    width: 50px;
    height: 80px;
    background: #1a1a1a;
    margin: 20px auto;
    border-radius: 40px;
    box-shadow: inset 0 0 10px #000;
  }
</style>
</head>

<body>
<div id="title-screen">

  <!-- CRT Monitor -->
  <div id="monitor">
    <div id="screen">

      <!-- IVIE silhouette -->
      <div id="ivie"></div>

      <!-- UI BUTTONS -->
      <button class="ui-btn">Play</button>
      <button class="ui-btn">Settings</button>
      <button class="ui-btn">Exit</button>

    </div>
  </div>

  <!-- Keyboard -->
  <div id="keyboard"></div>

  <!-- Mouse -->
  <div id="mouse"></div>

</div>
</body>
</html>
