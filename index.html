<div id="crt">
  <div id="frame">
    <div id="screen"></div>
    <div id="stickers">
      <div class="sticker heart"></div>
      <div class="sticker circle"></div>
    </div>
  </div>

  <div id="keyboard"></div>
  <div id="mouse"></div>
</div>

<style>
  body {
    background: #000;
  }

  #crt {
    position: relative;
    width: 500px;
    margin: 40px auto;
  }

  /* MONITOR FRAME */
  #frame {
    width: 420px;
    height: 320px;
    background: #2a2a2a; /* dead-tech dark grey */
    border-radius: 12px;
    border: 6px solid #1a1a1a;
    box-shadow:
      inset 0 0 20px #111,
      0 0 40px #000;
    position: relative;
  }

  /* SCREEN */
  #screen {
    width: 300px;
    height: 220px;
    background: #111;
    border: 4px solid #0d0d0d;
    margin: 40px auto;
    box-shadow:
      inset 0 0 25px #000,
      inset 0 0 8px #222;
  }

  /* STICKERS */
  #stickers {
    position: absolute;
    top: 10px;
    left: 10px;
  }

  .sticker {
    width: 30px;
    height: 30px;
    opacity: 0.4; /* faded dead-tech */
    filter: grayscale(100%);
    background-size: cover;
    background-position: center;
    border-radius: 6px;
    margin-bottom: 8px;
  }

  .heart {
    background: linear-gradient(135deg, #555, #333);
    clip-path: polygon(
      50% 80%, 90% 40%, 75% 15%, 50% 30%, 25% 15%, 10% 40%
    );
  }

  .circle {
    background: #444;
    border-radius: 50%;
  }

  /* KEYBOARD */
  #keyboard {
    width: 420px;
    height: 80px;
    background: #1f1f1f;
    margin: 20px auto;
    border-radius: 8px;
    box-shadow:
      inset 0 0 10px #000,
      0 0 20px #000;
  }

  /* MOUSE */
  #mouse {
    width: 60px;
    height: 90px;
    background: #1c1c1c;
    border-radius: 40px;
    margin: 20px auto;
    box-shadow:
      inset 0 0 10px #000,
      0 0 20px #000;
  }
</style>
