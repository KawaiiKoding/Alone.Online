<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Alone.Online</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: monospace;
    }

    /* MAIN SCENE */
    #scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* BACKGROUND ROOM */
    #background {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
    }

    /* CRYING ANIME GIRL */
    #girl {
      position: absolute;
      right: 8%;
      bottom: 5%;
      width: 35%;
      z-index: 2;
      opacity: 0.95;
    }

    /* COMPUTER ON LEFT */
    #computer {
      position: absolute;
      left: 5%;
      bottom: 20%;
      width: 40%;
      z-index: 3;
      transform: rotate(-4deg);
    }

    /* UI ON COMPUTER SCREEN */
    #screen-ui {
      position: absolute;
      left: 14%;
      bottom: 38%;
      width: 20%;
      z-index: 4;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    button {
      background: #111;
      color: #fff;
      border: 1px solid #444;
      padding: 10px 20px;
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.2s, transform 0.1s;
    }

    button:hover {
      background: #222;
      transform: scale(1.05);
    }

    /* TITLE */
    #title {
      position: absolute;
      top: 5%;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: 3rem;
      letter-spacing: 2px;
      z-index: 5;
      text-shadow: 0 0 10px #fff;
    }

    /* Subtitle */
    #subtitle {
      position: absolute;
      top: 13%;
      left: 50%;
      transform: translateX(-50%);
      color: #ccc;
      font-size: 1.2rem;
      opacity: 0.7;
      z-index: 5;
    }

  </style>
</head>

<body>

  <div id="scene">

    <!-- Replace these with your PNGs -->
    <img id="background" src="room_bg.png">
    <img id="girl" src="ivie_crying.png">
    <img id="computer" src="computer_left_angle.png">

    <h1 id="title">Alone.Online</h1>
    <p id="subtitle">Can you trust him?</p>

    <div id="screen-ui">
      <button id="playBtn">Play</button>
      <button id="settingsBtn">Settings</button>
      <button id="exitBtn">Exit</button>
    </div>

  </div>

  <script>
    // Title flicker
    const title = document.getElementById("title");
    setInterval(() => {
      if (Math.random() < 0.03) {
        title.style.opacity = 0.2;
        setTimeout(() => title.style.opacity = 1, 80);
      }
    }, 400);

    // Subtitle flicker
    const subtitle = document.getElementById("subtitle");
    setInterval(() => {
      if (Math.random() < 0.02) {
        subtitle.style.opacity = 0.2;
        setTimeout(() => subtitle.style.opacity = 0.7, 120);
      }
    }, 500);

    // TEMP BUTTON ACTIONS
    document.getElementById("playBtn").onclick = () => {
      alert("Game starting soon…");
    };

    document.getElementById("settingsBtn").onclick = () => {
      alert("Settings coming soon…");
    };

    document.getElementById("exitBtn").onclick = () => {
      alert("Exit not implemented yet.");
    };
  </script>

</body>
</html>
