<div id="title-screen">
  <!-- CRT Monitor -->
  <div id="monitor">
    <div id="screen">
      <!-- IVIE (simple shape silhouette) -->
      <div id="ivie"></div>

      <!-- UI BUTTONS -->
      <button class="ui-btn">Play</button>
      <button class="ui-btn">Settings</button>
      <button class="ui-btn">Exit</button>
    </div>
  </div>

  <!-- Keyboard -->
  <div id="keyboard"></div>

  <!-- Mouse -->
  <div id="mouse"></div>
</div>

<style>
  body {
    background: #000;
    font-family: monospace;
  }

  #title-screen {
    width: 400px;
    margin: 40px auto;
    text-align: center;
  }

  /* MONITOR */
  #monitor {
    width: 350px;
    height: 260px;
    background: #1a1a1a;
    border-radius: 12px;
    border: 6px solid #0f0f0f;
    box-shadow: inset 0 0 20px #000;
    margin: 0 auto;
    position: relative;
  }

  /* SCREEN */
  #screen {
    width: 260px;
    height: 180px;
    background: #0d0d0d;
    margin: 30px auto;
    border: 4px solid #000;
    box-shadow: inset 0 0 20px #000;
    position: relative;
    padding-top: 10px;
  }

  /* IVIE silhouette */
  #ivie {
    width: 80px;
    height: 120px;
    background: #222;
    border-radius: 40px 40px 0 0;
    margin: 0 auto 10px auto;
    box-shadow: inset 0 0 10px #000;
  }

  /* UI BUTTONS */
  .ui-btn {
    display: block;
    width: 140px;
    margin: 6px auto;
    padding: 6px;
    background: #1c1c1c;
    color: #ccc;
    border: 2px solid #333;
    border-radius: 4px;
    cursor: pointer;
    transition: 0.2s;
  }

  .ui-btn:hover {
    background: #222;
    color: #fff;
    transform: scale(1.05);
  }

  /* KEYBOARD */
  #keyboard {
    width: 350px;
    height: 60px;
    background: #1a1a1a;
    margin: 20px auto;
    border-radius: 8px;
    box-shadow: inset 0 0 10px #000;
  }

  /* MOUSE */
  #mouse {
    width: 50px;
    height: 80px;
    background: #1a1a1a;
    margin: 20px auto;
    border-radius: 40px;
    box-shadow: inset 0 0 10px #000;
  }
</style>
