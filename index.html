<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Alone.Online</title>

<style>
  body {
    background: #000;
    font-family: monospace;
    display: flex;
    justify-content: center;
    padding-top: 40px;
  }

  /* MONITOR FRAME */
  #monitor {
    width: 420px;
    height: 300px;
    background: #111;
    border-radius: 14px;
    border: 6px solid #0a0a0a;
    box-shadow: 0 0 25px #000 inset;
    position: relative;
    padding-top: 20px;
    overflow: hidden;
  }

  /* 3D LAYERED LINES */
  #depth-lines {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 330px;
    height: 220px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    pointer-events: none;
  }

  .line {
    height: 6px;
    margin: 2px 0;
    background: linear-gradient(to right, #444, #888, #444);
    opacity: 0.25;
    border-radius: 4px;
    transform-origin: center;
  }

  /* SCREEN */
  #screen {
    width: 330px;
    height: 220px;
    margin: 0 auto;
    border-radius: 10px;
    background: radial-gradient(circle,
      #dcdcdc 0%,
      #c8c8c8 20%,
      #b0b0b0 35%,
      #1a1a1a 100%
    );
    box-shadow:
      inset 0 0 25px #ccc,
      inset 0 0 50px #ddd,
      0 0 10px #aaa;
    position: relative;
    padding-top: 20px;
  }

  /* CENTER DARK OVAL */
  #center-oval {
    width: 180px;
    height: 90px;
    background: radial-gradient(circle, #000 0%, #222 60%, transparent 100%);
    margin: 0 auto 20px auto;
    border-radius: 50%;
    opacity: 0.6;
  }

  /* MENU BUTTONS */
  .ui-btn {
    display: block;
    width: 180px;
    margin: 10px auto;
    padding: 10px;
    background: rgba(255,255,255,0.12);
    border: 2px solid rgba(255,255,255,0.25);
    border-radius: 6px;
    color: #eee;
    font-size: 1.2em;
    text-shadow: 0 0 4px #ccc;
    cursor: pointer;
    transition: 0.2s;
  }

  .ui-btn:hover {
    background: rgba(255,255,255,0.18);
    transform: scale(1.05);
  }
</style>
</head>

<body>

<div id="monitor">

  <!-- 3D LINES BEHIND SCREEN -->
  <div id="depth-lines">
    <!-- 20 stacked lines for depth -->
    <div class="line" style="transform: scaleX(1.0);"></div>
    <div class="line" style="transform: scaleX(0.95);"></div>
    <div class="line" style="transform: scaleX(0.90);"></div>
    <div class="line" style="transform: scaleX(0.85);"></div>
    <div class="line" style="transform: scaleX(0.80);"></div>
    <div class="line" style="transform: scaleX(0.75);"></div>
    <div class="line" style="transform: scaleX(0.70);"></div>
    <div class="line" style="transform: scaleX(0.65);"></div>
    <div class="line" style="transform: scaleX(0.60);"></div>
    <div class="line" style="transform: scaleX(0.55);"></div>
    <div class="line" style="transform: scaleX(0.50);"></div>
    <div class="line" style="transform: scaleX(0.45);"></div>
    <div class="line" style="transform: scaleX(0.40);"></div>
    <div class="line" style="transform: scaleX(0.35);"></div>
    <div class="line" style="transform: scaleX(0.30);"></div>
    <div class="line" style="transform: scaleX(0.25);"></div>
    <div class="line" style="transform: scaleX(0.20);"></div>
    <div class="line" style="transform: scaleX(0.15);"></div>
    <div class="line" style="transform: scaleX(0.10);"></div>
    <div class="line" style="transform: scaleX(0.05);"></div>
  </div>

  <!-- SCREEN -->
  <div id="screen">

    <div id="center-oval"></div>

    <button class="ui-btn">Play</button>
    <button class="ui-btn">Settings</button>
    <button class="ui-btn">Exit</button>

  </div>
</div>

</body>
</html>
