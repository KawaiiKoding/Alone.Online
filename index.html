<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Alone.Online</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: monospace;
    }

    /* Background image (your uploaded scene) */
    #bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-image: url("background.png");
      background-size: cover;
      background-position: center;
      z-index: 1;
    }

    /* Flickering monitor overlay */
    #monitor-flicker {
      position: fixed;
      left: 18%;   /* matches monitor position in your image */
      top: 32%;
      width: 18%;
      height: 22%;
      background: rgba(255,255,255,0.9);
      mix-blend-mode: screen;
      animation: flicker 0.08s infinite;
      z-index: 2;
      pointer-events: none;
    }

    @keyframes flicker {
      0%   { opacity: 0.9; }
      50%  { opacity: 0.3; }
      100% { opacity: 0.8; }
    }

    /* UI */
    #ui {
      position: absolute;
      top: 20%;
      width: 100%;
      text-align: center;
      color: #fff;
      z-index: 3;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
      letter-spacing: 2px;
      transition: opacity 0.2s;
    }

    #subtitle {
      font-size: 1.2rem;
      margin-top: -5px;
      opacity: 0.7;
      letter-spacing: 1px;
      transition: opacity 0.2s;
    }

    button {
      background: #111;
      color: #fff;
      border: 1px solid #444;
      padding: 10px 20px;
      margin: 10px;
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.2s, transform 0.1s;
    }

    button:hover {
      background: #222;
      transform: scale(1.05);
    }

    #warning {
      font-size: 0.9rem;
      margin-top: 20px;
      opacity: 0.5;
      color: #ff4444;
      letter-spacing: 1px;
    }
  </style>
</head>

<body>

  <div id="bg"></div>
  <div id="monitor-flicker"></div>

  <div id="ui">
    <h1 id="title">Alone.Online</h1>
    <p id="subtitle">Can you trust him?</p>

    <button id="startBtn">Start</button>
    <button id="settingsBtn">Settings</button>
    <button id="exitBtn">Exit</button>

    <p id="warning">⚠ Bright colours and flashing lights</p>
  </div>

  <script>
    // Title flicker
    const title = document.getElementById("title");
    setInterval(() => {
      if (Math.random() < 0.03) {
        title.style.opacity = 0.2;
        setTimeout(() => title.style.opacity = 1, 80);
      }
    }, 400);

    // Subtitle flicker
    const subtitle = document.getElementById("subtitle");
    setInterval(() => {
      if (Math.random() < 0.02) {
        subtitle.style.opacity = 0.2;
        setTimeout(() => subtitle.style.opacity = 0.7, 120);
      }
    }, 500);
  </script>

</body>
</html>
