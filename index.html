<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Alone.Online</title>

<style>
  body {
    background: #000;
    font-family: monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  /* MONITOR FRAME */
  #monitor {
    width: 420px;
    height: 300px;
    background: #111;
    border-radius: 14px;
    border: 6px solid #0a0a0a;
    box-shadow: 0 0 40px #fff, inset 0 0 40px #000;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  /* GLOWING SCREEN */
  #screen {
    width: 340px;
    height: 220px;
    background: radial-gradient(circle, #ffffff 0%, #e6e6e6 30%, #cfcfcf 45%, #111 100%);
    border-radius: 10px;
    box-shadow:
      0 0 60px #fff,
      inset 0 0 40px #fff,
      inset 0 0 80px #ffffff;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  /* CENTER OVAL (like your image) */
  #center-oval {
    width: 160px;
    height: 80px;
    background: rgba(0,0,0,0.4);
    border-radius: 50%;
    margin-bottom: 25px;
    box-shadow: inset 0 0 20px #000;
  }

  /* BUTTONS */
  .ui-btn {
    width: 180px;
    padding: 10px;
    margin: 8px;
    background: rgba(255,255,255,0.25);
    border: 2px solid rgba(255,255,255,0.5);
    border-radius: 6px;
    color: #fff;
    font-size: 1.2em;
    text-shadow: 0 0 10px #fff;
    cursor: pointer;
    transition: 0.2s;
  }

  .ui-btn:hover {
    background: rgba(255,255,255,0.35);
    transform: scale(1.05);
  }
</style>
</head>

<body>

<div id="monitor">
  <div id="screen">

    <div id="center-oval"></div>

    <button class="ui-btn">Play</button>
    <button class="ui-btn">Settings</button>
    <button class="ui-btn">Exit</button>

  </div>
</div>

</body>
</html>
